name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install package + dev dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check audio2report/ tests/

      - name: Mypy (type check)
        run: uv run mypy audio2report/

      - name: Verify imports
        run: |
          uv run python -c "
          import audio2report
          from audio2report.pipeline.dual import DualMicPipeline
          from audio2report.pipeline.single import SingleMicPipeline
          print('imports OK, version:', audio2report.__version__)
          "

      - name: Run tests
        run: uv run pytest tests/

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        run: uv run pytest tests/ --cov=audio2report --cov-report=xml -q
