name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: Verify imports
        run: |
          python -c "
          import audio2report
          from audio2report.pipeline.dual import DualMicPipeline
          from audio2report.pipeline.single import SingleMicPipeline
          print('imports OK, version:', audio2report.__version__)
          "

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Upload coverage (optional)
        if: matrix.python-version == '3.11'
        run: |
          pip install pytest-cov --quiet
          pytest tests/ --cov=audio2report --cov-report=xml --tb=short -q
        continue-on-error: true
